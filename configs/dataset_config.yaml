# Configuration files (YAML/JSON) for datasets and training hyperparameters
vieneu_tts_dataset:
  name: "pnnbao-ump/VieNeu-TTS-140h"  # Default dataset name
  sample_rate: 24000  # Sample rate for output audio
  split: "train"  # VieNeu-TTS-140h has only 'train' split, so we will handle val/test splitting ourselves
  seed: 42 # Random seed for reproducibility when loading the dataset

vieneu_tts_perturbation:
  sample_rate: 16000  # Sample rate for output audio
  pitch_shift_down_range: [-6.5, -3.5] # Giảm biên độ Pitch xuống tối đa 6.5 bán cung (Nửa quãng 8)
  pitch_shift_up_range: [-6.5, -3.5] # Tăng biên độ Pitch lên tối đa 6.5 bán cung (Nửa quãng 8)
  formant_shift_down_range: [1.10, 1.20] # Giả lập người lớn hơn (giọng trầm hơn)
  formant_shift_up_range: [0.80, 0.90]   # Giả lập người nhỏ hơn (giọng thanh hơn)
  f0_high_thresh: 200.0
  f0_low_thresh: 110.0
  eq_center_freq_range: [100.0, 8000.0]
  eq_gain_range: [-12.0, 12.0]
  eq_q_range: [1.5, 4.0]
  seed: 42  # Random seed for reproducibility

vieneu_tts_perturbated_dataset:
  name: "Haloroute/VieNeu-TTS-140h-perturbed" # Dataset name for the perturbed version of VieNeu-TTS-140h
  train_size: 0.9 # Proportion of data to use for training
  seed: 42 # Random seed for reproducibility when splitting the dataset